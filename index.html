<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commandes Golden Spur</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">
    <section class="card">

      <div class="header">
        <h1>Commandes Golden Spur</h1>
        <p>Formulaire fictif pour serveur roleplay</p>
      </div>

      <div class="warning">
        ⚠️ Toute copie de ce site est interdite et sera sanctionnée sans préavis.
      </div>

      <form id="orderForm">

        <label for="clientName">Nom / Prénom</label>
        <input type="text" id="clientName" placeholder="Ex : John Lefevbre" required />

        <label for="phoneNumber">Numéro de téléphone</label>
        <input type="text" id="phoneNumber" placeholder="Ex : 06 12 33 45 96 " required />

        <label for="orderType">Type de demande</label>
        <select id="orderType" required>
          <option value="couteaux">Couteaux</option>
          <option value="contrat">Contrat point de drogue</option>
        </select>

        <div id="knifeSection">
          <label for="knifeQuantity">Nombre de couteaux</label>
          <input type="number" id="knifeQuantity" min="1" value="1" />

          <div class="priceBox">
            Prix total : <span id="totalPrice">6 500€</span>
          </div>
        </div>

        <div id="contractSection" style="display: none;">
          <label for="contractPoint">Point concerné</label>
          <input
            type="text"
            id="contractPoint"
            placeholder="LSD uniquement"
          />

          <label for="contractDetails">Détails du contrat</label>
          <textarea
            id="contractDetails"
            placeholder="Explique la demande RP..."
          ></textarea>
        </div>

        <label for="extraInfo">Informations supplémentaires</label>
        <textarea
          id="extraInfo"
          placeholder="Disponibilités, numéro de téléphone complémentaire, détails utiles..."
        ></textarea>

        <button type="button" id="previewButton">
          Voir le récapitulatif
        </button>

        <p id="statusMessage"></p>
      </form>
    </section>
  </main>

  <div id="summaryModal" class="modal hidden">
    <div class="modalContent">
      <h2>Récapitulatif</h2>
      <div id="summaryContent"></div>

      <div class="modalActions">
        <button type="button" id="editButton" class="secondaryButton">Modifier</button>
        <button type="button" id="confirmButton">Valider la commande</button>
      </div>
    </div>
  </div>

  <div id="successOverlay" class="successOverlay hidden">
    <div class="successBox">
      <div class="checkmark">✓</div>
      <h2>Commande envoyée</h2>
      <p>La demande a bien été transmise sur Discord.</p>
    </div>
  </div>

  <script>
    const orderType = document.getElementById("orderType");
    const knifeSection = document.getElementById("knifeSection");
    const contractSection = document.getElementById("contractSection");
    const knifeQuantity = document.getElementById("knifeQuantity");
    const totalPrice = document.getElementById("totalPrice");

    const PRICE_KNIFE = 6500;

    function formatPrice(price) {
      return price.toLocaleString("fr-FR") + "€";
    }

    function updatePrice() {
      const quantity = Math.max(1, Number(knifeQuantity.value || 1));
      const total = quantity * PRICE_KNIFE;
      totalPrice.textContent = formatPrice(total);
    }

    function updateSections() {
      if (orderType.value === "couteaux") {
        knifeSection.style.display = "block";
        contractSection.style.display = "none";
      } else {
        knifeSection.style.display = "none";
        contractSection.style.display = "block";
      }
    }

    orderType.addEventListener("change", updateSections);
    knifeQuantity.addEventListener("input", updatePrice);

    updateSections();
    updatePrice();
  </script>

  <script src="script.js"></script>

  <footer class="footer">
    Créé par <strong>Le Chrétien</strong> | <strong>Laaw</strong>
</footer>
  
</body>
</html>
