<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Commandes RP</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="container">
    <section class="card">

      <div class="header">
        <h1>Commandes RP</h1>
        <p>Formulaire fictif pour serveur roleplay</p>
      </div>

      <div class="warning">
        ⚠️ Site uniquement destiné au roleplay. Aucune commande réelle.
      </div>

      <form id="orderForm">

        <label for="clientName">Nom / Prénom RP</label>
        <input type="text" id="clientName" placeholder="Ex : Leon Kaelis" required />

        <label for="phoneNumber">Numéro de téléphone RP</label>
        <input type="text" id="phoneNumber" placeholder="Ex : 555-1234" required />

        <label for="orderType">Type de demande</label>
        <select id="orderType" required>
          <option value="couteaux">Couteaux</option>
          <option value="contrat">Contrat point de drogue</option>
        </select>

        <div id="knifeSection">
          <label for="knifeQuantity">Nombre de couteaux</label>
          <input type="number" id="knifeQuantity" min="1" value="1" />

          <div class="priceBox">
            Prix total : <span id="totalPrice">6 500€</span>
          </div>
        </div>

        <div id="contractSection" class="hidden">
          <label for="contractPoint">Point concerné</label>
          <input type="text" id="contractPoint" placeholder="Ex : Weed / Cocaïne / Meth..." />

          <label for="contractDetails">Détails du contrat</label>
          <textarea id="contractDetails" placeholder="Explique la demande RP..."></textarea>
        </div>

        <label for="extraInfo">Informations supplémentaires</label>
        <textarea id="extraInfo" placeholder="Disponibilités, lieu de rendez-vous RP, détails utiles..."></textarea>

        <button type="button" id="previewButton">Voir le récapitulatif</button>

        <p id="statusMessage"></p>
      </form>
    </section>
  </main>

  <div id="summaryModal" class="modal hidden">
    <div class="modalContent">
      <h2>Récapitulatif</h2>

      <div id="summaryContent"></div>

      <div class="modalActions">
        <button type="button" id="editButton" class="secondaryButton">Modifier</button>
        <button type="button" id="confirmButton">Valider la commande</button>
      </div>
    </div>
  </div>

  <div id="successOverlay" class="successOverlay hidden">
    <div class="successBox">
      <div class="checkmark">✓</div>
      <h2>Commande envoyée</h2>
      <p>La demande a bien été transmise sur Discord.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
